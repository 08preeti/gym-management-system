<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gym Management - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="../js/login.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Titan Fitness</h2>
</div>
<div class="flex flex-col items-center justify-center px-4 py-8 max-w-md mx-auto w-full">
<div class="@container w-full">
<div class="@[480px]:px-0 @[480px]:py-3">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden bg-slate-200 dark:bg-slate-800 rounded-xl min-h-64 shadow-2xl relative" data-alt="Athletic person training in a modern dark gym" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDQ8sgnTG4tPCGuqf-XjOMbKMobo-hPzr9we6yQnw1xJMtHjpOsoKcNnVa5bJDWv8ZX5tkBKI_7tFDqV701XT_0cpJjXAt22JhvCfyrWWp3VJuyBAs1INqVCdfr_amL6T70AQvP6qyt3Pr6Ixx1f9wHoh4dRrp7eIaN2iizbnk5jL9okb5v8V_J7OZ84LLbxrc_0TvZzbF92QKaGVPYJ_7SzdOj6rhO5xpqlvr3KWLMkqz58ScQHMkc1wpOed_t8fCKFzR4MCCz118p");'>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
<div class="relative p-6">
<h1 class="text-white tracking-light text-[32px] font-bold leading-tight">Push Your Limits</h1>
</div>
</div>
</div>
</div>
<div class="w-full mt-8">
<h1 class="text-slate-900 dark:text-slate-100 tracking-light text-2xl font-bold leading-tight text-center pb-2">Welcome Back</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-6 text-center">Log in to your account to continue your fitness journey</p>
<div class="flex py-3 mb-6">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="truncate">Member</span>
<input checked="" class="invisible w-0" name="user-type" type="radio" value="Member"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="truncate">Admin</span>
<input class="invisible w-0" name="user-type" type="radio" value="Admin"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-primary has-[:checked]:text-white text-slate-600 dark:text-slate-400 text-sm font-medium leading-normal transition-all">
<span class="truncate">User</span>
<input class="invisible w-0" name="user-type" type="radio" value="User"/>
</label>
</div>
</div>
<form class="space-y-4">
<div class="space-y-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-500" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-xl py-3 pl-11 pr-12 focus:ring-2 focus:ring-primary text-slate-900 dark:text-slate-100 placeholder:text-slate-500" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-1">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-slate-300 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400">Remember me</span>
</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all mt-4 active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Join the Gym</a>
</p>
</div>
</div>
</div>
<div class="mt-auto p-6 text-center text-xs text-slate-500 dark:text-slate-500 uppercase tracking-widest">
            Powered by Titan OS • v4.2.0
        </div>
</div>
</body></html>
